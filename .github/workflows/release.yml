name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact-name: linux
          - os: windows-latest
            target: win
            artifact-name: windows
          - os: macos-latest
            target: mac
            artifact-name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Free up disk space (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android
          sudo apt-get clean
          df -h

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libuuid1 libasound2t64 libgbm1 \
            libssl-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build distributables
        run: pnpm electron-builder --${{ matrix.target }} -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.artifact-name }}
          path: ./pack/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: '*'
          generate_release_notes: true
          fail_on_unmatched_files: false
