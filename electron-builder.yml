appId: "com.placeholder.ytmusic-app"
productName: "YT Music"
files:
  - '!*'
  - dist
  - assets
  - license
  - 'node_modules/**'
  - '!node_modules/**/.cache'
  - '!node_modules/**/*.map'
  - '!node_modules/**/*.ts'
  - '!node_modules/**/test/**'
  - '!node_modules/**/tests/**'
  - '!node_modules/**/docs/**'
  - '!node_modules/**/example/**'
  - '!node_modules/**/examples/**'
asarUnpack:
  - assets
mac:
  identity: null
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/generated/icons/mac/icon.icon
  compression: maximum
win:
  icon: assets/generated/icons/win/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  compression: maximum
nsis:
  runAfterFinish: false
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  icon: assets/generated/icons/png
  category: AudioVideo
  desktop:
    entry:
      StartupWMClass: "com.placeholder.ytmusic_app"
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
        - armv7l
    - target: deb
      arch:
        - x64
        - arm64
        - armv7l
    - target: rpm
      arch:
        - x64
        - arm64
    - target: snap
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
        - arm64
        - armv7l
appImage:
  description: "YT Music Desktop App"
  category: AudioVideo
deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libasound2
    - libgbm1
rpm:
  depends:
    - libuuid
  fpm:
    - '--rpm-rpmbuild-define'
    - _build_id_links none
snap:
  slots:
    - mpris:
        interface: mpris
directories:
  output: ./pack/
